name: 抖音自动生成
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 运行生成
        run: python main.py
      - name: 提交更新
        run: |
          git config --global user.name "auto"
          git config --global user.email "auto@auto.com"
          git add output.txt
          git commit -m "自动更新"
          git push
